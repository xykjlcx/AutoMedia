services:
  automedia:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - automedia-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/automedia.db
      - RSSHUB_BASE_URL=https://rsshub.rssforever.com
      # AI 模型配置（也可在设置页面配置）
      # - ANTHROPIC_API_KEY=sk-ant-...
      # - OPENAI_API_KEY=sk-...
      - APP_URL=http://localhost:3000
    restart: unless-stopped

volumes:
  automedia-data:

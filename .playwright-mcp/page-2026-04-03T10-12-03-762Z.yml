                  - generic [ref=e899]: 订阅轰炸（Subscription Bombing）是一种网络骚扰手段，攻击者利用目标邮箱在数千个服务上批量注册，触发大量确认邮件。该攻击利用正常订阅流程，难以从技术层面完全阻断。攻击者常借此掩盖重要邮件（如银行通知）或与其他攻击手段（如人肉搜索）结合使用。对开发者而言，可关注的技术缓解方案包括：使用临时邮箱注册、配置邮件过滤规则、启用双因素认证绑定备用邮箱等。此类攻击反映出在追求便利的同时，邮箱作为身份凭证的安全隐患。
